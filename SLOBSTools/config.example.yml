vods:
  source:
    path: "/path/to/vod/inbox"
    pattern: "{date} {time}.{ext}"

  match:
    strategy: date_prefix
    fallback: interactive
    fallback_window_days: 3   # narrow the interactive picker to nearby dates instead of every unmatched folder
    reference:
      path: "/path/to/recordings"
      name_template: "{date}_{title}.{ext}"
      fields:
        title:
          source: folder_name
          prompt_if_missing: true

  output:
    path: "/path/to/vod/output"
    operation: move
